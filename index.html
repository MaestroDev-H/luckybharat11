<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Image Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hero">
        <div class="left-col">
            <div class="back-section">
                <img src="images/back_image.png" alt="Back Image" class="back-img">
                <div class="champ-text">CHAMPION</div>
                <div class="number-text">1</div>
            </div>
            <div class="bottom-row">
                <div class="qr-section">
                    <img src="images/qr.svg" alt="Demo QR Code" class="demo-qr-side">
                    <div class="qr-text">SCAN, PLAY & WIN</div>
                </div>
                <div class="status-section">
                    <img src="images/status banner.png" alt="Status Banner" class="status-img">
                    <div class="status-text">STATUS: NOT FOR SALE.</div>
                    <div class="winner-text">WINNER-ONLY TIER</div>
                </div>
            </div>
        </div>
<div class="right-col">

    <div class="title-div">
      <h1>DESIGN YOUR <span>LEGACY</span></h1>
    </div>

    <div class="frame-div">
      <img class="frame-img" src="images/frame.png" alt="UI Frame">

      <div class="frame-content">
        <div class="section-label">
          <span class="num">01</span> CUSTOMIZE KIT
        </div>

        <img class="divider-img" src="images/line.svg" alt="Divider">

        <div class="kit-row">
          <div class="kit-left">
            <div class="lbl">JERSEY STYLE</div>
            <div class="jersey-wrap">
              <img src="images/jersey number.png" alt="Jersey">
              <div class="jersey-num-text">10</div>
            </div>
            <div class="lucky-label">LUCKY<br>NUMBER</div>
          </div>

          <div class="kit-right">
            <div class="banner-wrap">
              <img src="images/champion banner.png" alt="Champion Banner">
              <div class="banner-text champion-text">CHAMPION</div>
            </div>

            <div class="banner-wrap">
              <img src="images/name banner.png" alt="Name Banner">
              <div class="banner-text name-text">RAHEL</div>
            </div>

            <div class="design-saved-wrap">
              <img src="images/design save.png" alt="Status Background">
              <button class="design-saved-btn">DESIGN SAVED</button>
            </div>
          </div>
        </div>

        <div class="sub-text">
          SELECT YOUR PREFERRED STYLE AND CUSTOMIZE YOUR DETAILS TO CREATE A UNIQUE LEGACY PIECE
        </div>

        <div class="save-jersey-wrap">
          <img src="images/jersey save.png" alt="Save Button Background">
          <button class="save-jersey-btn">SAVE JERSEY</button>
        </div>

      </div>
    </div>

  </div>
    </div>
</body>
</html>
